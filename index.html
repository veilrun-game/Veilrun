<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEILRUN</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
</head>
<body>
  <div class="seam-v"></div>
  <main class="landing">
    <div class="wrap">
      <p class="eyebrow">A game built around us</p>
      <h1 class="display" style="font-size: var(--fs-hero); margin-top: var(--s-4);">VEIL<span style="color:var(--magenta)">RUN</span></h1>
      <p class="tag">Two halves of a breaking world. One crew fluent in both.</p>
      <div class="auth" id="auth">
        <button type="button" class="btn google-btn" id="googleBtn">
          <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.47.9 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
        <div class="auth-or"><span>or</span></div>
        <div class="auth-tabs">
          <button type="button" class="auth-tab active" id="tab-signin">Sign in</button>
          <button type="button" class="auth-tab" id="tab-signup">Create account</button>
        </div>
        <form id="authForm" autocomplete="off">
          <input id="displayName" class="fld-in" placeholder="Display name" style="display:none" autocomplete="off" />
          <input id="email" class="fld-in" type="email" placeholder="Email" autocomplete="off" />
          <input id="password" class="fld-in" type="password" placeholder="Password (min 6 characters)" autocomplete="off" />
          <button class="btn" type="submit" id="authSubmit">Sign in</button>
        </form>
        <button type="button" class="linklike" id="toggleCode">Or enter with a shared code</button>
        <form class="gate" id="gate" autocomplete="off" style="display:none">
          <input type="password" id="pw" placeholder="Shared passphrase" aria-label="Passphrase" />
          <button class="btn ghost" type="submit">Enter</button>
        </form>
      </div>
      <div class="err" id="err"></div>
      <p class="mute" style="margin-top: var(--s-8); font-size: var(--fs-small);">Private concept preview · not final</p>
    </div>
  </main>

  <div class="handle-modal" id="handleModal" style="display:none">
    <div class="handle-card">
      <p class="eyebrow">One thing first</p>
      <h3>Pick your display name</h3>
      <p class="mute">This is what shows on the leaderboard and your feedback. Go with a fun handle — you can change it anytime in your profile.</p>
      <input id="handleInput" class="fld-in" maxlength="24" placeholder="Your handle" autocomplete="off" />
      <div class="handle-btns"><button class="btn" id="handleSave">Continue</button></div>
    </div>
  </div>

  <div class="handle-modal" id="msgModal" style="display:none">
    <div class="handle-card">
      <p class="eyebrow" id="msgEyebrow"></p>
      <h3 id="msgTitle"></h3>
      <p class="mute" id="msgBody"></p>
      <div class="handle-btns"><button class="btn" id="msgBtn">Got it</button></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    // Individual accounts via Supabase Auth (accurate attribution for the leaderboard).
    // The shared passphrase stays as a soft fallback for quick/guest access.
    // Email-confirmation return: Supabase brings users back with #type=signup in the URL hash.
    // Read it now, before the Supabase client loads and clears the hash.
    const justConfirmed = new URLSearchParams((location.hash || "").replace(/^#/, "")).get("type") === "signup";
    const cfg = window.VEILRUN_CONFIG || {};
    const sb = (cfg.supabaseUrl && cfg.supabaseAnonKey && window.supabase)
      ? window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey) : null;
    const $ = (id) => document.getElementById(id);
    const PASSPHRASE = "bothsides"; // soft fallback; not real security (source is viewable).
    let mode = "signin";
    let entered = false;
    let welcomeShown = false;

    function showMsg(o) {
      $("msgEyebrow").textContent = o.eyebrow || "";
      $("msgTitle").textContent = o.title || "";
      $("msgBody").textContent = o.body || "";
      const b = $("msgBtn"); b.textContent = o.btn || "Got it"; b.onclick = o.onBtn || hideMsg;
      $("msgModal").style.display = "flex";
    }
    function hideMsg() { $("msgModal").style.display = "none"; }

    function setMode(m) {
      mode = m;
      $("tab-signin").classList.toggle("active", m === "signin");
      $("tab-signup").classList.toggle("active", m === "signup");
      $("displayName").style.display = m === "signup" ? "block" : "none";
      $("authSubmit").textContent = m === "signup" ? "Create account" : "Sign in";
      $("err").textContent = "";
    }
    $("tab-signin").onclick = () => setMode("signin");
    $("tab-signup").onclick = () => setMode("signup");
    $("toggleCode").onclick = () => { const g = $("gate"); g.style.display = g.style.display === "none" ? "flex" : "none"; };

    function enter(name, provider) {
      entered = true;
      sessionStorage.setItem("vr_ok", "1");
      if (name) { localStorage.setItem("vr_who", name); localStorage.setItem("vr_account", name); }
      if (provider) localStorage.setItem("vr_auth_provider", provider);
      window.location.href = "app.html#hub";
    }

    $("authForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("err").textContent = "";
      if (!sb) { $("err").textContent = "Accounts aren't available right now — use a shared code below."; return; }
      const email = $("email").value.trim(), password = $("password").value;
      if (!email || !password) { $("err").textContent = "Enter your email and password."; return; }
      $("authSubmit").disabled = true;
      try {
        if (mode === "signup") {
          const name = $("displayName").value.trim();
          if (!name) { $("err").textContent = "Pick a display name."; $("authSubmit").disabled = false; return; }
          const { data, error } = await sb.auth.signUp({ email, password, options: { data: { display_name: name } } });
          if (error) throw error;
          if (data.session) { enter(name, "password"); }
          else {
            $("authSubmit").disabled = false;
            showMsg({
              eyebrow: "Almost there",
              title: "Check your email",
              body: "We sent a confirmation link to " + email + ". Click it to finish creating your account — then you're in. (If it's not there in a minute, check spam.)",
              btn: "Got it",
              onBtn: () => { hideMsg(); setMode("signin"); }
            });
            return;
          }
        } else {
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          const name = (data.user && data.user.user_metadata && data.user.user_metadata.display_name) || email.split("@")[0];
          enter(name, "password");
        }
      } catch (err) {
        const m = (err && err.message) || "Something went wrong.";
        $("err").textContent = /email not confirmed/i.test(m)
          ? "Almost there — check your inbox and click the confirmation link, then sign in."
          : /invalid login/i.test(m) ? "That email and password don't match."
          : m;
      }
      $("authSubmit").disabled = false;
    });

    $("gate").addEventListener("submit", (e) => {
      e.preventDefault();
      const val = $("pw").value.trim().toLowerCase();
      if (val === PASSPHRASE) {
        sessionStorage.setItem("vr_ok", "1");
        localStorage.removeItem("vr_account"); // shared-code users keep pick-your-name
        localStorage.removeItem("vr_auth_provider");
        window.location.href = "app.html#hub";
      } else { $("err").textContent = "The seam doesn't open for that."; }
    });

    // Continue with Google (OAuth). Returns to this page, where we detect the session below.
    $("googleBtn").addEventListener("click", async () => {
      $("err").textContent = "";
      if (!sb) { $("err").textContent = "Google sign-in isn't available right now — use email or a shared code."; return; }
      const { error } = await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: location.origin + location.pathname } });
      if (error) $("err").textContent = error.message || "Couldn't start Google sign-in.";
    });

    // Auto-enter when a Supabase session exists — both on OAuth return and for already-signed-in users.
    let pendingName = "";
    function enterFromSession(session) {
      if (entered || !session || !session.user) return;
      const u = session.user, m = u.user_metadata || {};
      const googleName = m.display_name || m.full_name || m.name || (u.email ? u.email.split("@")[0] : "Crew");
      // Just clicked the email confirmation link → welcome them before entering the Hub.
      if (justConfirmed && !welcomeShown) {
        welcomeShown = true; entered = true;
        try { history.replaceState(null, "", location.pathname); } catch (e) {}
        showMsg({
          eyebrow: "You're in",
          title: "Account created — welcome" + (m.display_name ? ", " + m.display_name : "") + "!",
          body: "Your email is confirmed and your account is ready. Jump into the Hub whenever you're set.",
          btn: "Continue to the Hub →",
          onBtn: () => enter(googleName, "password")
        });
        return;
      }
      // No chosen handle on the account yet → let them pick one (fun handle beats a real name).
      if (!m.display_name) {
        const prev = (localStorage.getItem("vr_who") || "").trim();
        const suggested = (prev && prev.toLowerCase() !== (m.full_name || "").toLowerCase()) ? prev : googleName;
        pendingName = googleName;
        entered = true; // stop the other session callback from double-firing
        showHandlePrompt(suggested);
        return;
      }
      enter(googleName, "google");
    }
    async function chooseHandle(name) {
      const v = (name || "").trim() || pendingName || "Crew";
      if (sb) { try { await sb.auth.updateUser({ data: { display_name: v } }); } catch (e) {} }
      enter(v, "google");
    }
    function showHandlePrompt(suggested) {
      $("handleInput").value = suggested || "";
      $("handleModal").style.display = "flex";
      setTimeout(() => { $("handleInput").focus(); $("handleInput").select(); }, 60);
    }
    $("handleSave").addEventListener("click", () => chooseHandle($("handleInput").value));
    $("handleModal").addEventListener("keydown", (e) => { if (e.key === "Enter") chooseHandle($("handleInput").value); });
    if (sb) {
      sb.auth.onAuthStateChange((_e, session) => { if (session) enterFromSession(session); });
      sb.auth.getSession().then(({ data }) => { if (data && data.session) enterFromSession(data.session); });
    }

    if (justConfirmed) {
      // Confirm link returned but no session materialized (link already used / expired) → still acknowledge.
      setTimeout(() => {
        if (!welcomeShown && !entered) {
          welcomeShown = true;
          try { history.replaceState(null, "", location.pathname); } catch (e) {}
          showMsg({
            eyebrow: "You're set",
            title: "Email confirmed",
            body: "Your account is ready — sign in with your email and password to jump in.",
            btn: "Sign in",
            onBtn: () => { hideMsg(); setMode("signin"); $("email").focus(); }
          });
        }
      }, 2500);
    }

    setMode("signin");
  </script>
</body>
</html>
